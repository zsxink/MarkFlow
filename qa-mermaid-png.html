<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>MarkFlow Mermaid PNG QA</title>
</head>
<body>
  <pre id="results">running</pre>
  <script type="module">
    const resultsEl = document.getElementById('results');
    const invokeCalls = [];
    const clipboardWrites = [];
    const canvasSizes = [];
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    const originalToBlob = HTMLCanvasElement.prototype.toBlob;

    class ClipboardItemMock {
      constructor(items) {
        this.items = items;
      }
    }

    Object.defineProperty(window, 'ClipboardItem', { value: ClipboardItemMock, configurable: true });
    Object.defineProperty(navigator, 'clipboard', {
      configurable: true,
      value: {
        async write(items) {
          const normalized = [];
          for (const item of items) {
            const entries = [];
            for (const [type, blob] of Object.entries(item.items || {})) {
              entries.push({ type, size: blob?.size ?? null, blobType: blob?.type ?? null });
            }
            normalized.push(entries);
          }
          clipboardWrites.push(normalized);
        },
      },
    });

    HTMLCanvasElement.prototype.toBlob = function(callback, type) {
      canvasSizes.push({ width: this.width, height: this.height, type });
      callback(new Blob(['png'], { type: 'image/png' }));
    };

    window.__TAURI_INTERNALS__ = {
      async invoke(cmd, args) {
        invokeCalls.push({ cmd, args });
        if (cmd === 'save_mermaid_png_export') return true;
        if (cmd === 'save_mermaid_svg_export') return true;
        throw new Error(`Unexpected invoke: ${cmd}`);
      },
      transformCallback(fn) { return fn; },
      unregisterCallback() {},
      convertFileSrc(filePath) { return filePath; },
      metadata: {},
    };
    window.__TAURI_EVENT_PLUGIN_INTERNALS__ = { unregisterListener() {} };

    try {
      const { showMermaidContextMenu } = await import('/src/components/mermaidContextMenu.ts');
      const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="120" viewBox="0 0 240 80"><rect width="240" height="80" fill="red" /></svg>';

      async function clickAction(action) {
        showMermaidContextMenu(80, 80, { svg, defaultName: 'mermaid-test' });
        await sleep(50);
        const button = document.querySelector(`#mermaid-context-menu [data-action="${action}"]`);
        if (!button) throw new Error(`missing action ${action}`);
        button.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
        await sleep(150);
      }

      await clickAction('save-png');
      await clickAction('copy-png');

      resultsEl.textContent = JSON.stringify({
        ok: true,
        canvasSizes,
        invokeCalls,
        clipboardWrites,
      }, null, 2);
    } catch (error) {
      resultsEl.textContent = JSON.stringify({
        ok: false,
        error: String(error),
        stack: error && error.stack ? String(error.stack) : null,
        canvasSizes,
        invokeCalls,
        clipboardWrites,
      }, null, 2);
    } finally {
      HTMLCanvasElement.prototype.toBlob = originalToBlob;
    }
  </script>
</body>
</html>
