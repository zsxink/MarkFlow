<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>MarkFlow Remote Save QA</title>
</head>
<body>
  <div id="toast" hidden></div>
  <pre id="results">running</pre>
  <script type="module">
    const resultsEl = document.getElementById('results');
    const invokeCalls = [];
    const fetchCalls = [];
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    const pngBase64 = 'iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAIAAAD91JpzAAAAD0lEQVR4nGP8z8DAwMAAAAYIAQHLR3Z1AAAAAElFTkSuQmCC';

    window.fetch = async (...args) => {
      fetchCalls.push(args.map(String));
      throw new Error('browser fetch should not be used');
    };

    window.__TAURI_INTERNALS__ = {
      async invoke(cmd, args) {
        invokeCalls.push({ cmd, args });
        if (cmd === 'fetch_remote_image_as_base64') {
          return { data: pngBase64, mimeType: 'image/png' };
        }
        if (cmd === 'save_image_export') return true;
        throw new Error(`Unexpected invoke: ${cmd}`);
      },
      transformCallback(fn) { return fn; },
      unregisterCallback() {},
      convertFileSrc(filePath) { return filePath; },
      metadata: {},
    };
    window.__TAURI_EVENT_PLUGIN_INTERNALS__ = { unregisterListener() {} };

    try {
      const { showImageContextMenu } = await import('/src/components/imageContextMenu.ts');
      const state = {
        src: 'https://example.com/demo.png',
        originalSrc: 'https://example.com/demo.png',
        docPath: null,
      };

      showImageContextMenu(100, 100, state);
      await sleep(50);
      const button = document.querySelector('#image-context-menu [data-action="save-image"]');
      if (!button) throw new Error('missing save-image button');
      button.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
      await sleep(800);

      resultsEl.textContent = JSON.stringify({
        ok: true,
        invokeCalls,
        fetchCalls,
        toast: document.getElementById('toast')?.textContent || null,
      }, null, 2);
    } catch (error) {
      resultsEl.textContent = JSON.stringify({
        ok: false,
        error: String(error),
        stack: error && error.stack ? String(error.stack) : null,
        invokeCalls,
        fetchCalls,
        toast: document.getElementById('toast')?.textContent || null,
      }, null, 2);
    }
  </script>
</body>
</html>
