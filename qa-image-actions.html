<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>MarkFlow Image Actions QA</title>
</head>
<body>
  <pre id="results">running</pre>
  <script type="module">
    const resultsEl = document.getElementById('results');
    const observations = [];
    const invokeCalls = [];
    const clipboardTexts = [];
    const clipboardWrites = [];
    const fetchCalls = [];
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    const pngBase64 = 'iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAIAAAD91JpzAAAAD0lEQVR4nGP8z8DAwMAAAAYIAQHLR3Z1AAAAAElFTkSuQmCC';

    class ClipboardItemMock {
      constructor(items) {
        this.items = items;
      }
    }

    Object.defineProperty(window, 'ClipboardItem', { value: ClipboardItemMock, configurable: true });
    Object.defineProperty(navigator, 'clipboard', {
      configurable: true,
      value: {
        async write(items) {
          const normalized = [];
          for (const item of items) {
            const entries = [];
            for (const [type, blob] of Object.entries(item.items || {})) {
              entries.push({ type, size: blob?.size ?? null, blobType: blob?.type ?? null });
            }
            normalized.push(entries);
          }
          clipboardWrites.push(normalized);
        },
        async writeText(text) {
          clipboardTexts.push(text);
        },
      },
    });

    window.fetch = async (...args) => {
      fetchCalls.push(args.map(String));
      throw new Error('browser fetch should not be used');
    };

    window.__TAURI_INTERNALS__ = {
      async invoke(cmd, args) {
        invokeCalls.push({ cmd, args });
        if (cmd === 'read_file_as_base64') return pngBase64;
        if (cmd === 'save_image_export') return true;
        if (cmd === 'fetch_remote_image_as_base64') {
          return { data: pngBase64, mimeType: 'image/png' };
        }
        if (cmd === 'plugin:shell|open') return null;
        throw new Error(`Unexpected invoke: ${cmd}`);
      },
      transformCallback(fn) { return fn; },
      unregisterCallback() {},
      convertFileSrc(filePath) { return filePath; },
      metadata: {},
    };
    window.__TAURI_EVENT_PLUGIN_INTERNALS__ = { unregisterListener() {} };

    try {
      const { showImageContextMenu } = await import('/src/components/imageContextMenu.ts');

      async function clickAction(state, action) {
        showImageContextMenu(120, 120, state);
        await sleep(50);
        const button = document.querySelector(`#image-context-menu [data-action="${action}"]`);
        if (!button) throw new Error(`missing action ${action}`);
        button.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
        await sleep(120);
      }

      const localState = {
        src: 'asset://localhost/C:/Users/xian/Pictures/test.png',
        originalSrc: 'asset://localhost/C:/Users/xian/Pictures/test.png',
        docPath: null,
      };
      await clickAction(localState, 'copy-image');
      await clickAction(localState, 'save-image');
      await clickAction(localState, 'copy-path');
      await clickAction(localState, 'open-folder');

      const remoteState = {
        src: 'https://example.com/demo.png',
        originalSrc: 'https://example.com/demo.png',
        docPath: null,
      };
      await clickAction(remoteState, 'copy-image');
      await clickAction(remoteState, 'save-image');

      observations.push({
        label: 'localActions',
        value: {
          readCalls: invokeCalls.filter(call => call.cmd === 'read_file_as_base64'),
          saveCalls: invokeCalls.filter(call => call.cmd === 'save_image_export').slice(0, 1),
          openCalls: invokeCalls.filter(call => call.cmd === 'plugin:shell|open'),
          copiedPath: clipboardTexts[0] || null,
          clipboardWrites: clipboardWrites.slice(0, 1),
        },
      });

      observations.push({
        label: 'remoteActions',
        value: {
          remoteFetchCalls: invokeCalls.filter(call => call.cmd === 'fetch_remote_image_as_base64'),
          remoteSaveCalls: invokeCalls.filter(call => call.cmd === 'save_image_export').slice(1),
          clipboardWrites: clipboardWrites.slice(1),
        },
      });

      resultsEl.textContent = JSON.stringify({
        ok: true,
        observations,
        invokeCalls,
        clipboardTexts,
        clipboardWrites,
        fetchCalls,
      }, null, 2);
    } catch (error) {
      resultsEl.textContent = JSON.stringify({
        ok: false,
        error: String(error),
        stack: error && error.stack ? String(error.stack) : null,
        observations,
        invokeCalls,
        clipboardTexts,
        clipboardWrites,
        fetchCalls,
      }, null, 2);
    }
  </script>
</body>
</html>
