name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Set platform-specific product name
        shell: bash
        run: |
          SUFFIX=""
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then SUFFIX="Win"
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then SUFFIX="macOS"
          elif [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then SUFFIX="Linux"
          fi
          export SUFFIX
          echo "Platform suffix: $SUFFIX"
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
            conf.productName = 'MarkFlow-' + process.env.SUFFIX;
            fs.writeFileSync(path, JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MarkFlow ${{ github.ref_name }}
          releaseBody: |
            ## MarkFlow ${{ github.ref_name }}

            ### 下载说明
            - **Windows**: 下载 `.exe` 文件运行安装
            - **macOS**: 下载 `.dmg` 文件，将 MarkFlow 拖入 Applications
            - **Linux**: 下载 `.AppImage` 或 `.deb` 文件安装
          releaseDraft: true
          prerelease: false
