<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkFlow</title>
  </head>
  <body>
    <div id="app">
      <div id="toolbar" class="toolbar">
        <button class="toolbar-btn" id="sidebar-toggle" data-tooltip="切换侧边栏 (Ctrl+\)">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
        </button>
        <div class="toolbar-brand" id="toolbar-menu-btn">Mark<span>Flow</span> ▾
          <div id="app-menu" class="app-menu" hidden>
            <div class="app-menu-section" id="menu-recent-files">
              <div class="app-menu-section-title">最近打开的文件</div>
            </div>
            <div class="app-menu-section" id="menu-recent-folders">
              <div class="app-menu-section-title">最近打开的文件夹</div>
            </div>
            <div class="app-menu-footer">
              <button id="menu-clear-history">清除历史记录</button>
            </div>
          </div>
        </div>
        <span class="toolbar-separator"></span>
        <button class="toolbar-btn" id="sidebar-open-folder" data-tooltip="打开文件夹">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        </button>
        <button class="toolbar-btn" id="toolbar-open-file" data-tooltip="打开文件 (Ctrl+O)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-new" data-tooltip="新建文件 (Ctrl+N)">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-save" aria-label="保存" data-tooltip="保存 (Ctrl+S)">
          <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-export" type="button" aria-label="导出" aria-haspopup="menu" data-tooltip="导出">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14a2 2 0 0 0 2-2v-3"/><path d="M3 16v3a2 2 0 0 0 2 2"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-settings" aria-label="设置" data-tooltip="设置">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <span class="toolbar-separator"></span>
        <button class="toolbar-btn" id="btn-bold" aria-label="粗体" data-tooltip="粗体 (Ctrl+B)">
          <svg viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z"/><path d="M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-italic" data-tooltip="斜体 (Ctrl+I)">
          <svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-strike" data-tooltip="删除线">
          <svg viewBox="0 0 24 24"><path d="M16 4H9a3 3 0 00-3 3v0a3 3 0 003 3h6"/><line x1="4" y1="12" x2="20" y2="12"/><path d="M8 20h7a3 3 0 003-3v0a3 3 0 00-3-3h-1"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-code" data-tooltip="行内代码 (Ctrl+&#96;)">
          <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
        <span class="toolbar-separator"></span>
        <button class="toolbar-btn" id="btn-h1" data-tooltip="标题 1">
          <svg viewBox="0 0 24 24"><text x="2" y="18" font-size="16" font-weight="700" fill="currentColor" stroke="none">H1</text></svg>
        </button>
        <button class="toolbar-btn" id="btn-h2" data-tooltip="标题 2">
          <svg viewBox="0 0 24 24"><text x="2" y="18" font-size="16" font-weight="700" fill="currentColor" stroke="none">H2</text></svg>
        </button>
        <button class="toolbar-btn" id="btn-quote" data-tooltip="引用">
          <svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-link" data-tooltip="链接 (Ctrl+K)">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-ul" data-tooltip="无序列表">
          <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-ol" data-tooltip="有序列表">
          <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="9" font-size="8" fill="currentColor" stroke="none">1</text><text x="2" y="15" font-size="8" fill="currentColor" stroke="none">2</text><text x="2" y="21" font-size="8" fill="currentColor" stroke="none">3</text></svg>
        </button>
        <button class="toolbar-btn" id="btn-hr" data-tooltip="分隔线">
          <svg viewBox="0 0 24 24"><line x1="2" y1="12" x2="22" y2="12"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-codeblock" data-tooltip="代码块">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="9 8 5 12 9 16"/><polyline points="15 8 19 12 15 16"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-image" data-tooltip="插入图片">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <span class="toolbar-separator"></span>
        <button class="toolbar-btn active" id="btn-wysiwyg" aria-label="所见即所得" data-tooltip="所见即所得">
          <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-source" aria-label="源码模式" data-tooltip="源码模式 (Ctrl+/)">
          <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-focus" data-tooltip="专注模式 (Ctrl+Shift+F)">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>
        </button>
        <span class="toolbar-spacer"></span>
        <button class="toolbar-btn" id="btn-theme" data-tooltip="切换主题">
          <span id="theme-icon">☀️</span>
        </button>
      </div>
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-tabs">
          <button class="sidebar-tab" data-tab="files">文件</button>
          <button class="sidebar-tab active" data-tab="outline">大纲</button>
        </div>
        <div class="sidebar-content">
          <nav id="file-tree" hidden><div class="empty-state">请先打开文件夹</div></nav>
          <nav id="outline-tree"><div class="empty-state">当前文档无标题</div></nav>
        </div>
        <div id="sidebar-footer" class="sidebar-footer">
          <button class="sidebar-footer-action" id="sidebar-open-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
            打开文件夹
          </button>
<button class="sidebar-footer-action" id="sidebar-newfolder-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            新建文件夹
          </button>
        </div>
        <div class="sidebar-resize-handle"></div>
      </aside>
      <main id="editor-area" class="editor-area"></main>
      <footer id="statusbar" class="statusbar">
        <span class="statusbar-item statusbar-banner" id="autosave-banner" hidden></span>
        <span class="statusbar-item" id="word-count">0 字</span>
        <span class="statusbar-item" id="line-count">0 行</span>
        <span class="statusbar-item" id="cursor-pos">行 1, 列 1</span>
        <span class="statusbar-spacer"></span>
        <span class="statusbar-item" id="mode-indicator">所见即所得</span>
        <span class="statusbar-action" id="sb-settings" title="设置">⚙️</span>
        <span class="statusbar-action" id="sb-focus" title="专注模式">⛶</span>
        <span class="statusbar-action" id="sb-theme" title="切换主题">🌓</span>
      </footer>
    </div>
    <div id="context-menu" class="context-menu" hidden></div>
    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
