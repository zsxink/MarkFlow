name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Check capability security configuration
        run: scripts/check-capabilities.sh

      - name: Validate OpenSpec specs
        run: npm run validate:openspec

      - name: Check archived changes are synced to main specs
        run: bash scripts/check-archive-synced.sh

      - name: Build frontend
        run: npm run build

      - name: Check bundle size
        run: bash scripts/check-bundle-size.sh

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Run Rust Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
